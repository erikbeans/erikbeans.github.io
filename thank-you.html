<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thank You - Erik Beans</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            line-height: 1.6;
            color: #333;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .container {
            max-width: 900px;
            margin: 0 auto;
            padding: 20px;
            width: 100%;
        }
        
        .thank-you-card {
            background: white;
            border-radius: 10px;
            padding: 60px 40px;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
        }
        
        .checkmark {
            font-size: 4em;
            color: #28a745;
            margin-bottom: 20px;
        }
        
        h1 {
            font-size: 2.5em;
            color: #667eea;
            margin-bottom: 15px;
        }
        
        .subtitle {
            font-size: 1.2em;
            color: #666;
            margin-bottom: 30px;
            line-height: 1.8;
        }
        
        .message {
            font-size: 1.05em;
            color: #555;
            margin-bottom: 40px;
            line-height: 1.8;
        }
        
        .actions {
            display: flex;
            gap: 15px;
            justify-content: center;
            flex-wrap: wrap;
        }
        
        .btn {
            display: inline-block;
            padding: 12px 30px;
            border-radius: 5px;
            text-decoration: none;
            font-weight: 600;
            transition: background 0.3s;
            cursor: pointer;
            border: none;
            font-size: 1em;
        }
        
        .btn-primary {
            background: #667eea;
            color: white;
        }
        
        .btn-primary:hover {
            background: #764ba2;
        }
        
        .btn-secondary {
            background: #f0f0f0;
            color: #333;
        }
        
        .btn-secondary:hover {
            background: #e0e0e0;
        }
        
        footer {
            text-align: center;
            color: white;
            padding: 20px;
            font-size: 0.9em;
            margin-top: 60px;
        }
        
        @media (max-width: 600px) {
            .thank-you-card {
                padding: 40px 20px;
            }
            
            h1 {
                font-size: 1.8em;
            }
            
            .checkmark {
                font-size: 3em;
            }
            
            .actions {
                flex-direction: column;
            }
            
            .btn {
                width: 100%;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="thank-you-card">
            <div class="checkmark">✓</div>
            <h1>Thank You!</h1>
            <p class="subtitle">Your message has been received.</p>
            
            <p class="message">
                Thank you for taking the time to reach out. I appreciate your message and will get back to you as soon as possible.
            </p>
            
            <div class="actions">
                <a href="index.html" class="btn btn-primary">Back to Home</a>
                <a href="contact.html" class="btn btn-secondary">Send Another Message</a>
            </div>
        </div>
        
        <footer>
            <p>&copy; 2026 Erik Beans. All rights reserved.</p>
        </footer>
    </div>
</body>
</html>
